---
# tasks file for firstrole
 - name: install nginx
   yum:
     name: nginx
   when: ansible_system_vendor == "Amazon EC2"
   notify: restart

 - name: change port to 8080
   template:
         src: default.j2
         dest:  /etc/nginx/conf.d/default.conf
   notify: restart
   tags: n_port

 - name: change nginx page
   template:
         src: index.html.j2
         dest: /usr/share/nginx/html/index.html
   notify: restart
   tags: n_html

